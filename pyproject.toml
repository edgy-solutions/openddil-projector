[project]
name = "openddil-projector"
version = "0.1.0"
description = "OpenDDIL Kafka -> Postgres projector — populates ElectricSQL read-model tables from pipeline topics"
requires-python = ">=3.11"
dependencies = [
    # Kafka consumer. confluent-kafka wraps librdkafka; matches the version
    # used by cm-service and logistics-fusion-service.
    "confluent-kafka>=2.0.0,<3.0.0",
    # Async Postgres driver — the projector's only write path.
    "asyncpg>=0.29.0,<1.0.0",
    # Gencode in openddil-contracts/gen/python was generated by
    # grpcio-tools 6.31.1; the runtime must match that major version.
    "protobuf>=6.30.0,<7.0.0",
    # tactical-events arrive as CloudEvents JSON, not protobuf.
    "cloudevents>=1.10.0,<2.0.0",
    # Topic -> table mapping config (hot-reloadable via SIGHUP).
    "pyyaml>=6.0",
    # Prometheus metrics on :8084.
    "prometheus-client>=0.20.0,<1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["src/tests"]
addopts = "--cov=src --cov-report=term-missing"
asyncio_mode = "auto"
