# =============================================================================
# OpenDDIL Projector — topic -> table mapping
# =============================================================================
# Hot-reloadable via SIGHUP. Each entry binds one Kafka topic to one handler
# and one Postgres table. Adding a topic to the UI = a new entry here + a
# handler in src/handlers/ + a table in the Atlas schema.
#
#   topic          — Kafka topic to subscribe to
#   handler        — handler module name in src/handlers/ (without .py)
#   table          — Postgres table the handler writes
#   consumer_group — Kafka consumer group (one per topic, so lag is per-topic)
#   decode_as      — one of:
#                      * a fully-qualified proto message name
#                      * "cloudevents.json" for JSON CloudEvents
#                      * "json" for a plain json.dumps(...) payload
#   mode           — "upsert" (compacted topic -> UPSERT by PK) or
#                    "append" (event stream -> INSERT, with TTL pruning)
#   retention_hours — append mode only: rows older than this are pruned hourly
# =============================================================================

mappings:
  # cm-service emits asset-cm-state as JSON (json.dumps), NOT protobuf —
  # confirmed against the running stack in Phase 4a. Integer enum values
  # and *_ns integer timestamps; the cm_state handler owns the mapping.
  - topic: asset-cm-state
    handler: cm_state
    table: asset_cm_state
    consumer_group: projector-cm-state
    decode_as: json
    mode: upsert

  - topic: asset-logistics-status
    handler: logistics_status
    table: asset_logistics_status
    consumer_group: projector-logistics-status
    decode_as: openddil.logistics.v1.AssetLogisticsStatusUpdate
    mode: upsert

  - topic: telemetry-latest-state
    handler: telemetry_latest
    table: telemetry_latest_state
    consumer_group: projector-telemetry-latest
    decode_as: openddil.telemetry.v1.EntityTelemetryEvent
    mode: upsert

  - topic: tactical-events
    handler: tactical_events
    table: tactical_events
    consumer_group: projector-tactical-events
    decode_as: cloudevents.json
    mode: append
    retention_hours: 24

  - topic: asset-telemetry-windows
    handler: telemetry_windows
    table: asset_telemetry_windows
    consumer_group: projector-telemetry-windows
    decode_as: openddil.logistics.v1.WindowedTelemetry
    mode: upsert

  # ADR-0023 Phase 6b §B — regional rollups. Produced by faust-regional's
  # aggregator App to redpanda-hq. Only the hq projector instance should
  # subscribe (each instance has its own projector_config; per-edge
  # projectors do NOT need these entries).
  - topic: region-fleet-summary
    handler: region_fleet_summary
    table: region_fleet_summary
    consumer_group: projector-region-fleet-summary
    decode_as: openddil.regional.v1.RegionFleetSummary
    mode: upsert

  - topic: region-top-factors
    handler: region_top_factors
    table: region_top_factors
    consumer_group: projector-region-top-factors
    decode_as: openddil.regional.v1.RegionTopFactors
    mode: upsert

  - topic: region-wear-trends
    handler: region_wear_trends
    table: region_wear_trends
    consumer_group: projector-region-wear-trends
    decode_as: openddil.regional.v1.RegionWearTrends
    mode: upsert

  # Recipe v3 Sub-phase E — customer-overlay capability snapshots. The
  # customer1 strike-capability Bloblang produces asset-capability-snapshot
  # as JSON (a customer-overlay-specific Silver shape, not a proto type),
  # so decode_as is `json`. Compacted, keyed by asset_id -> upsert. The
  # topic is created on every cluster (topic-init parity), but only the
  # projector instance on the edge cluster the customer feed lands on
  # (edge-01 by convention) actually sees data — same single-writer
  # pattern as the regional rollups, inverted.
  - topic: asset-capability-snapshot
    handler: capability_state
    table: asset_capability_state
    consumer_group: projector-capability-state
    decode_as: json
    mode: upsert

# =============================================================================
# Edge assignment — for customer assets that don't carry edge_id
# =============================================================================
# Customer wire shapes (Unit telemetry, strike capability) carry no edge_id —
# edges are an OpenDDIL-side construct, not customer reality. The projector
# decides the presentation edge_id per asset using one of the registered
# strategies (see src/edge_assignment.py). New strategies plug in via
# @register_strategy without editing this file.
#
# THIS OSS DEFAULT IS EMPTY. No FOB coordinates and no asset-id mappings —
# customer-specific data does not belong in the OSS config. Customer assets
# fall through to the fallback ("edge-unspecified") on an OSS-only install.
#
# A deployment overlay supplies its own edge-assignment YAML (FOB lat/lons,
# prefix maps, etc.) as a ConfigMap mounted into the projector pod, and
# points the projector at it via the EDGE_ASSIGNMENT_CONFIG env var:
#
#   EDGE_ASSIGNMENT_CONFIG=/etc/openddil/edge-assignment/edge-assignment.yaml
#
# When that env var is set and the file exists, its contents REPLACE the
# block below at startup. The file may use this same top-level structure
# directly, OR wrap it under `edge_assignment:` — both shapes are accepted.
edge_assignment:
  strategy: chain
  chain: []
  fallback:
    edge_id: edge-unspecified
    region_id: region-unspecified

# Global tuning. Overridable via env (RATE_LIMIT_PER_SEC).
settings:
  # If one asset_id exceeds this many updates/sec, coalesce in a per-asset
  # buffer and UPSERT the latest only.
  rate_limit_per_sec: 10
  # Postgres write retry on failure (exponential backoff base, in seconds).
  postgres_retry_base_seconds: 0.5
  postgres_retry_max_seconds: 30
