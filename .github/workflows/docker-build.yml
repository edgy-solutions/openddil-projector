name: Docker Build

on:
  push:
    branches: [ "master" ]
    # Tag pushes (v1.0.0, ...) publish a versioned image (:v1.0.0)
    # alongside :latest so consumers can pin to a release.
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Publishes ghcr.io/edgy-solutions/openddil/projector:latest, which is what
# openddil-demo/docker-compose.yml references for the openddil-projector
# service. `${{ github.repository_owner }}` resolves to `edgy-solutions`.

jobs:
  build-projector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always publish :latest. On a v* tag push, ALSO publish the
      # tag-versioned image so consumers can pin to a release.
      - name: Compute image tags
        id: tags
        run: |
          REG=ghcr.io/${{ github.repository_owner }}/openddil/projector
          T="$REG:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            T="$T,$REG:${{ github.ref_name }}"
          fi
          echo "tags=$T" >> "$GITHUB_OUTPUT"

      - name: Build projector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
